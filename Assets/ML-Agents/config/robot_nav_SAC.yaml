behaviors:
  RobotNav:
    trainer_type: sac

    max_steps: 2000000

    hyperparameters:
      batch_size: 64
      buffer_size: 10000
      learning_rate: 3.0e-4
      learning_rate_schedule: constant

      # SAC-specific
      buffer_init_steps: 1000
      tau: 0.005
      steps_per_update: 1.0
      save_replay_buffer: false
      init_entcoef: 0.5

    network_settings:
      normalize: true
      hidden_units: 64
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    time_horizon: 128
    summary_freq: 10000
    checkpoint_interval: 50000
    keep_checkpoints: 5
    threaded: true