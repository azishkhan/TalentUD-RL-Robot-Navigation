behaviors:
  RobotNav:
    trainer_type: ppo
    max_steps: 2000000
    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      num_layers: 2
      hidden_units: 128
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      gail:
        gamma: 0.99
        strength: 0.5
        demo_path: Assets/Demonstrations/RobotNavDemo.demo
    behavioral_cloning:
      demo_path: Assets/Demonstrations/RobotNavDemo.demo
      strength: 0.5
      steps: 150000
    time_horizon: 64
    summary_freq: 10000
    checkpoint_interval: 50000
    keep_checkpoints: 5